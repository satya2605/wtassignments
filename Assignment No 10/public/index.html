<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #333; text-align: center; }
        form { display: grid; gap: 15px; margin-bottom: 30px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        button { padding: 12px; background-color: #5c67f2; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #4a54e1; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: #555; }
        tr:hover { background-color: #fcfcfc; }
    </style>
</head>
<body>

<div class="container">
    <h1>Student Registration</h1>
    
    <form id="regForm">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="text" id="course" placeholder="Course Name" required>
        <button type="submit">Register Student</button>
    </form>

    <hr>

    <h1>Registered Students</h1>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Course</th>
            </tr>
        </thead>
        <tbody id="studentTable">
            <!-- Data will be populated here -->
        </tbody>
    </table>
</div>

<script>
    const form = document.getElementById('regForm');
    const tableBody = document.getElementById('studentTable');

    // Fetch and display students
    async function loadStudents() {
        const res = await fetch('/api/students');
        const data = await res.json();
        tableBody.innerHTML = data.map(s => `
            <tr>
                <td>${s.name}</td>
                <td>${s.email}</td>
                <td>${s.course}</td>
            </tr>
        `).join('');
    }

    // Handle Form Submission
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const student = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            course: document.getElementById('course').value
        };

        const res = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(student)
        });

        if (res.ok) {
            alert('Student Registered!');
            form.reset();
            loadStudents();
        } else {
            const err = await res.json();
            alert('Error: ' + err.error);
        }
    });

    loadStudents();
</script>

</body>
</html>
