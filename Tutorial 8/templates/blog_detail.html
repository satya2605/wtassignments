<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ post.title }} | Tutorial 8</title>
    <style>
        body { font-family: 'Georgia', serif; line-height: 1.8; color: #333; max-width: 700px; margin: 0 auto; padding: 60px 20px; background: #fff; }
        .back { margin-bottom: 40px; display: block; color: #7f8c8d; text-decoration: none; font-size: 0.9rem; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; line-height: 1.2; }
        .meta { color: #95a5a6; margin-bottom: 40px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .content { font-size: 1.2rem; }
    </style>
</head>
<body>
    <a href="{% url 'blog_list' %}" class="back">← Back to Newsroom</a>
    
    <article>
        <h1>{{ post.title }}</h1>
        <div class="meta">Written by {{ post.author }} on {{ post.published_date|date:"F d, Y" }}</div>
        
        <div class="content">
            {{ post.content|linebreaks }}
        </div>
    </article>
</body>
</html>
