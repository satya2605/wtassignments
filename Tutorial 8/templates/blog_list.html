<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Latest News | Tutorial 8</title>
    <style>
        body { font-family: 'Georgia', serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 40px; background: #fdfdfd; }
        header { border-bottom: 2px solid #333; margin-bottom: 40px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: baseline; }
        .post { margin-bottom: 40px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .post h2 { margin-bottom: 10px; }
        .post h2 a { text-decoration: none; color: #2c3e50; }
        .post h2 a:hover { color: #e74c3c; }
        .meta { font-size: 0.85rem; color: #7f8c8d; margin-bottom: 15px; }
        .rss-btn { background: #e67e22; color: white; padding: 5px 15px; border-radius: 4px; text-decoration: none; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h1>Daily News Blog</h1>
        <a href="{% url 'blog_feed' %}" class="rss-btn">RSS Feed</a>
    </header>

    {% for post in posts %}
    <article class="post">
        <h2><a href="{% url 'blog_detail' post.pk %}">{{ post.title }}</a></h2>
        <div class="meta">By {{ post.author }} | {{ post.published_date|date:"M d, Y" }}</div>
        <p>{{ post.content|truncatewords:30 }}</p>
        <a href="{% url 'blog_detail' post.pk %}">Read More →</a>
    </article>
    {% empty %}
    <p>No news articles published yet.</p>
    {% endfor %}
</body>
</html>
