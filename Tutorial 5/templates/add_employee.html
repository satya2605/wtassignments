<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Employee | Tutorial 5</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f4f7f6; }
        .form-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        h2 { color: #2c3e50; text-align: center; }
        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3498db; border: none; color: white; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #2980b9; }
        .link { text-align: center; margin-top: 15px; display: block; color: #7f8c8d; text-decoration: none; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>Register Employee</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Add Employee</button>
        </form>
        <a href="{% url 'employee_list' %}" class="link">View All Employees</a>
    </div>
</body>
</html>
