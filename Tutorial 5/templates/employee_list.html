<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee List | Tutorial 5</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f4f7f6; }
        .table-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #34495e; color: white; }
        .btn-add { display: inline-block; padding: 10px 20px; background: #27ae60; color: white; text-decoration: none; border-radius: 5px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="table-card">
        <h2>Employee Directory</h2>
        <a href="{% url 'add_employee' %}" class="btn-add">+ Add New Employee</a>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Department</th>
                    <th>Salary</th>
                    <th>Joining Date</th>
                </tr>
            </thead>
            <tbody>
                {% for emp in employees %}
                <tr>
                    <td>{{ emp.name }}</td>
                    <td>{{ emp.email }}</td>
                    <td>{{ emp.department }}</td>
                    <td>${{ emp.salary }}</td>
                    <td>{{ emp.date_of_joining }}</td>
                </tr>
                {% empty %}
                <tr><td colspan="5" style="text-align: center;">No employees registered yet.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
